<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOF Assistant</title>
  <link rel="stylesheet" href="css/chat.css" />
</head>

<body>
  <div class="bg"></div>

  <div class="app-shell">
    <div class="chat-card">
      <header class="topbar">
        <div class="brand">
          <div class="brand-logo"></div>
          <div class="brand-title">MOF Assistant</div>
        </div>

        <div class="topbar-center">
          <div class="chip">
            <span class="chip-label">Model:</span>
            <span id="modelText" class="chip-value">Not configured</span>
          </div>
          <div class="chip">
            <span class="chip-label">CCDC:</span>
            <span id="ccdcText" class="chip-value">Disabled</span>
          </div>
        </div>

        <div class="topbar-actions">
          <button id="backBtn" class="icon-btn" type="button" title="Back to login">Back</button>
          <button id="clearBtn" class="icon-btn" type="button" title="Clear chat">Clear</button>
          <button id="exportBtn" class="icon-btn" type="button" title="Export chat">Export</button>
        </div>
      </header>

      <main id="chatMessages" class="messages">
        <div class="row row-assistant">
          <div class="avatar"></div>
          <div class="bubble bubble-assistant">
            Ask anything to preview the chat experience. Without a configured backend, the page will load a demo reply from a local txt file and stream it line by line.
          </div>
        </div>
      </main>

      <div id="statusText" class="statusbar">Ready</div>

      <form id="chatForm" class="inputbar">
        <textarea
          id="messageInput"
          class="input"
          placeholder="Type your message..."
          rows="1"
        ></textarea>

        <div class="input-actions">
          <button id="stopBtn" class="btn btn-stop" type="button">Stop</button>
          <button id="sendBtn" class="btn btn-send" type="submit">Send</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/chat.js"></script>
</body>

</html>
